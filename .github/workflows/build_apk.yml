name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Full history so versionCode (git commit count) isn't stuck at 1.
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Decode signing keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        mkdir -p $HOME/.android
        echo "$KEYSTORE_BASE64" | base64 -d > $HOME/.android/debug.keystore

    - name: Build APK with signing
      working-directory: consumers/anland_v5/android_consumer
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug \
          -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: anland-v5-debug
        path: consumers/anland_v5/android_consumer/app/build/outputs/apk/debug/app-debug.apk
