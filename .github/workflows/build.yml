name: Build APK and Daemon

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so `git rev-list --count HEAD` yields the real commit
          # count for versionCode (shallow checkout would make it always 1).
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools build-tools;34.0.0 ndk;29.0.13113456"
          accept-android-sdk-licenses: true

      - name: Set NDK_DIR environment variable
        run: echo "NDK_DIR=$ANDROID_HOME/ndk/29.0.13113456" >> $GITHUB_ENV

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p $HOME/.android
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/.android/debug.keystore

      - name: Build APK
        working-directory: consumers/anland_v5/android_consumer
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/anland-v5.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: anland-v5
          path: consumers/anland_v5/android_consumer/app/build/outputs/apk/release/anland-v5.apk

      - name: Configure CMake for Android
        run: |
          cmake -S . -B build_daemon_android \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_DIR/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-30 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build display_daemon
        run: cmake --build build_daemon_android --target display_daemon -j$(nproc)

      - name: Copy daemon to magisk_module directory
        run: |
          cp build_daemon_android/display_daemon magisk_module/
          chmod 755 magisk_module/display_daemon

      - name: Upload Magisk module
        uses: actions/upload-artifact@v7
        with:
          name: anland-daemon
          path: magisk_module/